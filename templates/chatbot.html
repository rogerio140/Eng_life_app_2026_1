<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Chatbot ESP32 - Monitoramento Inteligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header h1 {
            font-size: 1.5em;
            flex: 1;
        }

        .chat-header .status {
            font-size: 0.9em;
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 20px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-content pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 10px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.9em;
            margin: 10px 0;
        }

        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input input:focus {
            border-color: #667eea;
        }

        .chat-input button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
        }

        .chat-input button:hover {
            transform: scale(1.05);
        }

        .chat-input button:active {
            transform: scale(0.95);
        }

        .suggestions {
            padding: 10px 20px;
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .suggestion-btn {
            padding: 5px 12px;
            background: #e0e0e0;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.2s;
        }

        .suggestion-btn:hover {
            background: #667eea;
            color: white;
        }

        .typing-indicator {
            display: none;
            padding: 10px 20px;
            color: #999;
            font-style: italic;
        }

        .typing-indicator.active {
            display: block;
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }
            
            .chat-header h1 {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div style="font-size: 2em;">🤖</div>
            <h1>Chatbot ESP32 Monitor</h1>
            <div class="status">🟢 Online</div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Olá! 👋 Sou seu assistente de monitoramento ESP32.<br><br>
                    Posso ajudar com:<br>
                    📡 Dispositivos e sensores<br>
                    📊 Leituras e histórico<br>
                    ⚠️ Alertas e limites<br>
                    🍽️ Alimentadores<br><br>
                    Digite <strong>"ajuda"</strong> para ver todos os comandos!
                </div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            🤖 Bot está digitando...
        </div>
        
        <div class="suggestions">
            <button class="suggestion-btn" onclick="sendSuggestion('listar dispositivos')">📡 Listar dispositivos</button>
            <button class="suggestion-btn" onclick="sendSuggestion('status sensor')">📊 Status sensores</button>
            <button class="suggestion-btn" onclick="sendSuggestion('alimentadores')">🍽️ Alimentadores</button>
            <button class="suggestion-btn" onclick="sendSuggestion('alertas')">⚠️ Alertas</button>
            <button class="suggestion-btn" onclick="sendSuggestion('histórico')">📈 Histórico</button>
            <button class="suggestion-btn" onclick="sendSuggestion('ajuda')">❓ Ajuda</button>
        </div>
        
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Digite sua pergunta..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const typingIndicator = document.getElementById('typingIndicator');
        
        function sendSuggestion(text) {
            messageInput.value = text;
            sendMessage();
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Adicionar mensagem do usuário
            addMessage(message, 'user');
            messageInput.value = '';
            
            // Mostrar indicador de digitação
            typingIndicator.classList.add('active');
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // Esconder indicador de digitação
                typingIndicator.classList.remove('active');
                
                // Adicionar resposta do bot
                addMessage(data.response, 'bot');
                
            } catch (error) {
                typingIndicator.classList.remove('active');
                addMessage('❌ Erro de conexão. Verifique se o servidor está rodando.', 'bot');
            }
        }
        
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Processar texto para suportar formatação
            contentDiv.innerHTML = formatMessage(text);
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            // Scroll para o final
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function formatMessage(text) {
            // Converter quebras de linha para <br>
            let formatted = text.replace(/\n/g, '<br>');
            
            // Converter **texto** para <strong>
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Converter emojis e formatação adicional
            formatted = formatted.replace(/✅/g, '✅');
            formatted = formatted.replace(/❌/g, '❌');
            formatted = formatted.replace(/⚠️/g, '⚠️');
            formatted = formatted.replace(/🔴/g, '🔴');
            formatted = formatted.replace(/🟢/g, '🟢');
            formatted = formatted.replace(/📡/g, '📡');
            formatted = formatted.replace(/📊/g, '📊');
            formatted = formatted.replace(/🍽️/g, '🍽️');
            formatted = formatted.replace(/🎯/g, '🎯');
            formatted = formatted.replace(/🤖/g, '🤖');
            
            return formatted;
        }
        
        // Auto-focus no input
        messageInput.focus();
        
        // Verificar saúde do sistema periodicamente
        setInterval(async () => {
            try {
                const response = await fetch('/health');
                if (!response.ok) {
                    document.querySelector('.status').innerHTML = '🔴 Offline';
                    document.querySelector('.status').style.background = 'rgba(255,0,0,0.3)';
                } else {
                    document.querySelector('.status').innerHTML = '🟢 Online';
                    document.querySelector('.status').style.background = 'rgba(255,255,255,0.2)';
                }
            } catch (error) {
                document.querySelector('.status').innerHTML = '🔴 Offline';
                document.querySelector('.status').style.background = 'rgba(255,0,0,0.3)';
            }
        }, 30000);
    </script>
</body>
</html>
